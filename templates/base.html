<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Greybark Deal Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748b',
                            400: '#94a3b8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3">
                    <img src="/static/logo.png" alt="Greybark" class="h-10 w-10 rounded" onerror="this.style.display='none'">
                    <span class="text-xl font-bold text-white">Greybark Deal Tracker</span>
                </a>
                <nav class="flex items-center space-x-4">
                    <a href="/" class="text-slate-400 hover:text-white transition">Dashboard</a>
                    <a href="/project/new" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition">
                        + Nuevo Proyecto
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 border-t border-slate-700 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <p class="text-center text-slate-500 text-sm">
                Greybark Deal Tracker &copy; 2024
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
