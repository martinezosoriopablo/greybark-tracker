<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Greybark Deal Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#000000',
                            800: '#0a0a0a',
                            700: '#141414',
                            600: '#1f1f1f',
                            500: '#2a2a2a',
                            400: '#3d3d3d',
                        },
                        orange: {
                            500: '#ED7D31',
                            600: '#d46a25',
                            400: '#f59456',
                        },
                        gray: {
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Header -->
    <header class="bg-dark-700 border-b border-dark-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3">
                    <img src="/static/logo.png" alt="Greybark" class="h-10 w-10" onerror="this.style.display='none'">
                    <span class="text-xl font-bold text-white">Greybark Deal Tracker</span>
                </a>
                <nav class="flex items-center space-x-4">
                    <a href="/" class="text-gray-400 hover:text-orange-500 transition">Dashboard</a>
                    <a href="/project/new" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg transition font-medium">
                        + Nuevo Proyecto
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark-700 border-t border-dark-500 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <p class="text-center text-gray-500 text-sm">
                Greybark Deal Tracker &copy; 2024
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
